<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandar Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
}

.banner img{
    width:100%;
    height:350px;
    object-fit:cover;
}

.products{
    padding:20px;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.product-card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.product-card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.product-info{
    padding:15px;
}

.price{
    color:red;
    font-size:20px;
    font-weight:bold;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    background:#ff6600;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>

</head>
<body>

<header>
    <h1>🛍 Sandar Store</h1>
</header>

<!-- Banner -->
<section class="banner">
    <img src="images/banner.jpg" alt="Banner">
</section>

<!-- Products -->
<section class="products">

    <h2>Featured Products</h2>

    <div class="product-grid">

        <div class="product-card">

            <img src="images/shirt1.jpg" alt="Shirt">

            <div class="product-info">

                <h3>Fashion Shirt</h3>

                <p class="price">25,000 Ks</p>

                <button>Order Now</button>

            </div>

        </div>

    </div>

</section>

<footer>
    <p>© 2026 Sandar Store</p>
</footer>

</body>
</html>
