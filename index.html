<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandar Store</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

.banner img{
    width:100%;
    max-height:400px;
    object-fit:cover;
}

.product{
    max-width:400px;
    margin:30px auto;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
}

.info{
    padding:15px;
}

.price{
    color:red;
    font-size:22px;
    font-weight:bold;
}

button{
    width:100%;
    padding:12px;
    background:#ff6600;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

footer{
    text-align:center;
    background:#111;
    color:white;
    padding:15px;
    margin-top:30px;
}
</style>

</head>
<body>

<header>
    <h1>Sandar Store</h1>
</header>

<section class="banner">
    <img src="Screenshot_2026-06-20.jpg" alt="Banner">
</section>

<div class="product">
    <img src="Screenshot_2026-06-20.jpg" alt="Product">

    <div class="info">
        <h2>Fashion Product</h2>

        <p class="price">25000 Ks</p>

        <button>Order Now</button>
    </div>
</div>

<footer>
    © Sandar Store
</footer>

</body>
</html>
